  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",

<body>

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- HERO -->
  <section class="blog-hero py-5 text-center text-white">

    <div class="container">

      <h1 class="display-5 fw-bold">
        Our Blog
      </h1>

      <p class="lead">
        Insights, tips, and strategies for growing your business online
      </p>

    </div>

  </section>

  <!-- SEARCH BAR -->
  <section class="py-4 bg-primary">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-6">

          <div class="search-box position-relative">

            <i class="fas fa-search search-icon"></i>

            <input
              type="text"
              id="blogSearch"
              class="form-control form-control-lg"
              placeholder="Search articles...">

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- BLOG GRID -->
  <section class="blog-grid-section py-5">

    <div class="container">

      <div class="row g-4" id="blogContainer">

        <!-- DYNAMIC BLOG POSTS LOAD HERE -->

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- BLOG DATA -->
  <script src="assets/js/blog-data.js"></script>

  <!-- BLOG SYSTEM -->
  <script>

document.addEventListener("DOMContentLoaded", function () {

  const container = document.getElementById("blogContainer");
  const searchInput = document.getElementById("blogSearch");

  function renderPosts(posts) {

    container.innerHTML = "";

    if (posts.length === 0) {

      container.innerHTML = `
        <div class="col-12 text-center">
          <h4>No blog post found.</h4>
        </div>
      `;
      return;
    }

    posts.forEach(post => {

      const card = document.createElement("div");
      card.className = "col-12 col-sm-6 col-md-4 col-lg-3";

      card.innerHTML = `
        <a href="blog-details.html?slug=${post.slug}" class="blog-card-link">

          <div class="card blog-card h-100 border-0 shadow-sm">

            <img src="${post.image}"
                 class="card-img-top"
                 alt="${post.title}">

            <div class="card-body d-flex flex-column">

              <h5 class="card-title">
                ${post.title}
              </h5>

              <p class="card-text flex-grow-1">
                ${post.description}
              </p>

            </div>

          </div>

        </a>
      `;

      container.appendChild(card);

    });

  }

  renderPosts(blogPosts);

  /* SEARCH SYSTEM */
  searchInput.addEventListener("keyup", function () {

    const value = this.value.toLowerCase();

    const filteredPosts = blogPosts.filter(post =>
      post.title.toLowerCase().includes(value) ||
      post.category.toLowerCase().includes(value) ||
      post.description.toLowerCase().includes(value)
    );

    renderPosts(filteredPosts);

  });

});

</script>

  <!-- JS -->
  <script src="assets/js/main.js"></script>
  

</body>

</html>
